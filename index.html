<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice2Blog - Serverless POC</title>
    <meta name="description" content="Convert your voice into professional blog posts published directly to GitHub.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <div class="header-top">
                <h1 class="logo">Voice<span>2</span>Blog</h1>
                <button id="settingsBtn" class="btn-icon" title="Settings">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5A3.5 3.5 0 0 1 15.5 12A3.5 3.5 0 0 1 12 15.5M19.43 12.97c0-.32-.03-.66-.03-1c0-.33.03-.68.03-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.63c-.03.34-.03.68-.03 1s0 .67.03 1l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.39 1.06.73 1.69.98l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63z"></path></svg>
                </button>
            </div>
            <p class="subtitle">Turn your voice into a blog post in seconds.</p>
        </header>

        <section class="recorder-card">
            <div class="timer" id="timer">00:00</div>
            <div class="controls">
                <button id="recordBtn" class="btn btn-record" title="Start Recording">
                    <span class="icon"></span>
                    <span class="label">Record</span>
                </button>
                <button id="stopBtn" class="btn btn-stop" disabled title="Stop and Submit">
                    <span class="icon"></span>
                    <span class="label">Stop & Submit</span>
                </button>
            </div>
            
            <div class="status-panel">
                <div class="status-header">
                    <span>Logs & Progress</span>
                    <button id="clearLogs" class="btn-text">Clear</button>
                </div>
                <div id="statusLogs" class="status-logs">
                    <div class="log-entry system">Ready to record...</div>
                </div>
            </div>
        </section>

        <footer>
            <p>Serverless Voice-to-Blog POC &bull; IS 322 Project</p>
        </footer>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>API Settings</h2>
                <button id="closeModal" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="geminiKey">OpenAI API Key</label>
                    <input type="password" id="geminiKey" placeholder="sk-...">
                </div>
                <div class="input-group">
                    <label for="githubToken">GitHub Token (ghp_...)</label>
                    <input type="password" id="githubToken" placeholder="ghp_...">
                </div>
                <p class="hint">Keys are saved locally in your browser (LocalStorage).</p>
            </div>
            <div class="modal-footer">
                <button id="saveSettings" class="btn btn-stop">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Project Config (Placeholder for API Keys) -->
    <script src="js/config.js"></script>
    
    <!-- Modular Logic -->
    <script src="js/audio.js"></script>
    <script src="js/transcription.js"></script>
    <script src="js/content.js"></script>
    <script src="js/github.js"></script>
    
    <!-- Main Orchestrator -->
    <script src="js/app.js"></script>
</body>
</html>
